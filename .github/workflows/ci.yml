name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest tests/ -v
      # Eval gate — runs only when the secret is configured.
      # Blocks merges that make routing dumber.
      - if: ${{ secrets.NVIDIA_API_KEY != '' }}
        env: { NVIDIA_API_KEY: "${{ secrets.NVIDIA_API_KEY }}" }
        run: python evals/run_evals.py
