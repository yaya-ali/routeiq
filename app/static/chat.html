<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RouteIQ chat</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 0; background: #faf9f5; color: #1a1a1a;
         display: flex; flex-direction: column; height: 100dvh; }
  header { padding: 14px 20px; font-size: 0.95rem; color: #666; border-bottom: 1px solid #eee; background: #fff; }
  header b { color: #1a1a1a; font-weight: 600; }
  #log { flex: 1; overflow-y: auto; padding: 24px 16px 12px; }
  .row { max-width: 680px; margin: 0 auto 18px; display: flex; }
  .user { justify-content: flex-end; }
  .bubble { padding: 10px 14px; border-radius: 14px; line-height: 1.55; white-space: pre-wrap; max-width: 85%; }
  .user .bubble { background: #e8e5dc; }
  .bot .bubble { background: transparent; padding-left: 0; max-width: 100%; }
  .meta { max-width: 680px; margin: -12px auto 18px; font-size: 0.72rem; color: #999; }
  .thinking { color: #999; font-style: italic; }
  form { border-top: 1px solid #eee; background: #fff; padding: 12px 16px 18px; }
  .inputwrap { max-width: 680px; margin: 0 auto; display: flex; gap: 8px; }
  textarea { flex: 1; font: inherit; font-size: 1rem; padding: 12px 14px; border: 1px solid #d5d2c8; border-radius: 12px;
             resize: none; height: 48px; outline: none; background: #fff; }
  textarea:focus { border-color: #b0ab9d; }
  button { border: 0; background: #c96f4a; color: #fff; border-radius: 12px; padding: 0 18px; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<header><b>RouteIQ chat</b> &nbsp;·&nbsp; each reply shows which model answered and what it cost</header>
<div id="log"></div>
<form id="f">
  <div class="inputwrap">
    <textarea id="msg" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send" type="submit">Send</button>
  </div>
</form>
<script>
const log = document.getElementById("log");
const form = document.getElementById("f");
const input = document.getElementById("msg");
const sendBtn = document.getElementById("send");
const history = [];

function addRow(cls, text) {
  const row = document.createElement("div");
  row.className = "row " + cls;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  row.appendChild(b);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return b;
}

function addMeta(text) {
  const m = document.createElement("div");
  m.className = "meta";
  m.textContent = text;
  log.appendChild(m);
  log.scrollTop = log.scrollHeight;
}

function buildPrompt(latest) {
  const recent = history.slice(-6);
  if (!recent.length) return latest;
  const ctx = recent.map(t => (t.role === "user" ? "User: " : "Assistant: ") + t.text).join("\n");
  return "Continue this conversation naturally. Reply to the last user message only.\n\n"
       + ctx + "\nUser: " + latest + "\nAssistant:";
}

form.onsubmit = async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  sendBtn.disabled = true;
  addRow("user", text);
  const bubble = addRow("bot", "thinking...");
  bubble.classList.add("thinking");
  try {
    const res = await fetch("/v1/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ team: "chat-ui", prompt: buildPrompt(text) })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(typeof data.detail === "string" ? data.detail : "request failed");
    bubble.classList.remove("thinking");
    bubble.textContent = data.answer;
    addMeta(`${data.model_used} · $${data.cost_usd} · ${(data.latency_ms / 1000).toFixed(1)}s · ${data.routing_reason}`);
    history.push({ role: "user", text }, { role: "bot", text: data.answer });
  } catch (err) {
    bubble.textContent = "Error: " + err.message;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
};

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
input.focus();
</script>
</body>
</html>
